<div class="border">
    
    <div class="container" (click)="open()">
            <header>
                {{value?.id}} -
                <h2>{{value?.name}}</h2> 
            </header>
           

            <p>{{value?.restaurant}}</p>
            
            <p>R$ {{value?.price}}</p>
        
            <img class="image" [src]="value.image" alt="{{value.name}}">
          
            
    </div>
</div>
