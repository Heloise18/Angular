
<div class="modal" (click)="clicked()">
    <div class="border">
        
        <div class="container">
            <div>
                {{value?.id}}
                <h1>{{value?.name}}</h1> 
            </div>

            <p>{{value?.restaurant}}</p>
            
            <p>R$ {{value?.price}}</p>
            
            <img [src]="value?.image" alt="imagem">

            <footer>
                <Button (click)="clicked()" class="botao">COMPRAR</Button>
            </footer>
        </div>
    </div>

</div>
